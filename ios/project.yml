name: HeadsUp
options:
  bundleIdPrefix: md.headsup
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: N74WZGGX8W
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"

targets:
  HeadsUp:
    type: application
    platform: iOS
    sources:
      - path: HeadsUp
    info:
      path: HeadsUp/Info.plist
      properties:
        CFBundleDisplayName: HeadsUp
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "5"
        UILaunchScreen:
          UIColorName: "AccentColor"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - headsup
        UIBackgroundModes:
          - remote-notification
        # Required by the com.apple.developer.usernotifications.communication
        # entitlement — the NSE donates INSendMessageIntent so iOS renders
        # the agent avatar as the sender (Messages-style layout).
        NSUserActivityTypes:
          - INSendMessageIntent
        ApiBaseURL: "https://headsup.md"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.headsup.app
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          # Debug builds (Cmd-R from Xcode) use the development APNs sandbox.
          CODE_SIGN_ENTITLEMENTS: HeadsUp/HeadsUp.entitlements
        Release:
          # Release builds (TestFlight / App Store) talk to production APNs.
          # APNS_PRODUCTION on the server must also be set to true.
          CODE_SIGN_ENTITLEMENTS: HeadsUp/HeadsUpRelease.entitlements
    dependencies:
      - target: HeadsUpNotificationService

  HeadsUpNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: HeadsUpNotificationService
      - path: HeadsUp/Services/SharedMessageStore.swift
    info:
      path: HeadsUpNotificationService/Info.plist
      properties:
        CFBundleDisplayName: HeadsUp Notification Service
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "5"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.headsup.app.NotificationService
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "5"
        SKIP_INSTALL: NO

schemes:
  HeadsUp:
    build:
      targets:
        HeadsUp: all
        HeadsUpNotificationService: all
    run:
      config: Debug
      # Lets the simulator pretend the 3 Tip Jar IAPs are already approved
      # in App Store Connect, so we can take a real-prices screenshot of
      # Settings → Tip Jar to upload as the IAP review screenshot.
      storeKitConfiguration: HeadsUp/HeadsUp.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
